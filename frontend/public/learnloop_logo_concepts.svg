<line x1="34" y1="-14" x2="42" y2="-14" stroke="#06d6a0" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(6, 214, 160);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="35" y1="-12" x2="41" y2="-12" stroke="#06d6a0" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(6, 214, 160);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
