<line x1="42" y1="3" x2="12" y2="6" stroke="#06d6a0" stroke-width="0.7" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(6, 214, 160);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

