</g>

<!-- Text for concept 1 -->
<text x="340" y="260" text-anchor="middle" fill="var(--color-text-primary)" font-family="'Plus Jakarta Sans', var(--font-sans)" font-size="28" font-weight="700" letter-spacing="-0.5" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Plus Jakarta Sans&quot;, &quot;Anthropic Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Learn<tspan fill="#06d6a0" style="fill:rgb(6, 214, 160);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Plus Jakarta Sans&quot;, &quot;Anthropic Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Loop</tspan></text>
<text x="340" y="282" text-anchor="middle" fill="var(--color-text-tertiary)" font-family="var(--font-sans)" font-size="11" letter-spacing="3" style="fill:rgb(156, 154, 146);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">AI-POWERED STUDY PLATFORM</text>


