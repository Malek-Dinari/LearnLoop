<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#06d6a0"/>
<stop offset="100%" stop-color="#0fb5ba"/>
</linearGradient>
<linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1f2937"/>
<stop offset="100%" stop-color="#111827"/>
</linearGradient>
</defs>

<!-- Concept 1: Graduation cap with infinity loop -->
<text x="340" y="30" text-anchor="middle" fill="var(--color-text-secondary)" font-size="13" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Concept 1 — Graduation cap + infinity loop</text>

<g transform="translate(340, 160)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<!-- Infinity loop forming the base -->
<path d="M-60,20 C-60,-15 -20,-15 0,10 C20,-15 60,-15 60,20 C60,55 20,55 0,30 C-20,55 -60,55 -60,20 Z" fill="none" stroke="url(#tealGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Graduation cap (mortarboard) sitting on top of the loop -->
<!-- Board -->
<polygon points="0,-50 55,-30 0,-10 -55,-30" fill="#1f2937" stroke="url(#tealGrad)" stroke-width="1.5" style="fill:rgb(31, 41, 55);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Top surface shine -->
<polygon points="0,-48 50,-30 0,-12 -50,-30" fill="#283548" opacity="0.6" style="fill:rgb(40, 53, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<!-- Button on top -->
<circle cx="0" cy="-50" r="4" fill="url(#tealGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
