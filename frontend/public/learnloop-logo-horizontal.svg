<!-- Wordmark — white text for dark backgrounds -->
<text x="62" y="33" fill="#ffffff" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.3">Learn<tspan fill="#06d6a0">Loop</tspan></text>
