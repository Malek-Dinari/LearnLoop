<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#06d6a0"/>
<stop offset="100%" stop-color="#0fb5ba"/>
</linearGradient>
</defs>

<g transform="translate(150, 75)">
<!-- Infinity loop -->
<path d="M-40,14 C-40,-12 -14,-12 0,7 C14,-12 40,-12 40,14 C40,40 14,40 0,21 C-14,40 -40,40 -40,14 Z" fill="none" stroke="url(#tg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Graduation cap -->
<polygon points="0,-36 38,-22 0,-8 -38,-22" fill="#1e293b"/>
<polygon points="0,-34 34,-22 0,-10 -34,-22" fill="#283548"/>
<circle cx="0" cy="-36" r="3" fill="url(#tg)"/>
<path d="M0,-36 Q17,-33 24,-22" fill="none" stroke="url(#tg)" stroke-width="1.6" stroke-linecap="round"/>
<rect x="21" y="-22" width="5" height="10" rx="1.5" fill="url(#tg)"/>
<line x1="21" y1="-12" x2="26" y2="-12" stroke="#04b88a" stroke-width="1"/>
<!-- Energy dots -->
<circle cx="-46" cy="2" r="2.2" fill="#06d6a0" opacity="0.7"/>
<circle cx="46" cy="2" r="2.2" fill="#0fb5ba" opacity="0.7"/>
<circle cx="0" cy="46" r="1.8" fill="#06d6a0" opacity="0.5"/>
<circle cx="-28" cy="-34" r="1.6" fill="#0fb5ba" opacity="0.4"/>
<circle cx="36" cy="-34" r="1.4" fill="#06d6a0" opacity="0.35"/>
</g>

<!-- Wordmark — white for dark backgrounds -->
<text x="150" y="155" text-anchor="middle" fill="#ffffff" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">Learn<tspan fill="#06d6a0">Loop</tspan></text>
<text x="150" y="176" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" letter-spacing="3">AI-POWERED STUDY PLATFORM</text>
</svg>
