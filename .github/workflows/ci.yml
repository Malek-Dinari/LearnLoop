name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest

    env:
      # Run without any external dependencies
      USE_DATABASE: "false"
      CACHE_BACKEND: memory
      LLM_PROVIDER: ollama          # health_check will fail (Ollama absent) — tests mock it

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with ruff (if installed)
        run: |
          pip install ruff --quiet
          ruff check backend/app backend/tests || true

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  # ─── Frontend build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Next.js build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Placeholder URL — not a real backend at build time
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
